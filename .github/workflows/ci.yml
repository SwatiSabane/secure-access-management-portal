name: Django DevSecOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Security Scan
        run: bandit -r . -x ./venv || true

      - name: Django System Check
        run: python manage.py check

      - name: Build Docker Image
        run: docker build -t secure-access-management-portal:latest .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-access-management-portal:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      # 🧩 NEW: Docker Compose integration
      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 10

      - name: Run migrations
        run: docker compose exec -T web python manage.py migrate

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v